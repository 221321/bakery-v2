<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ВкусноЦех — вход</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body class="login-body">
<div class="login-card">
  <div class="login-logo">Вкусно<span>Цех</span></div>
  <div class="login-sub">производство · доставка · 1С</div>
  <div id="err" class="login-err" hidden></div>
  <label class="field"><span>Логин</span><input id="u" autocomplete="username" autofocus></label>
  <label class="field"><span>Пароль</span><input id="p" type="password" autocomplete="current-password"></label>
  <button class="btn btn-primary btn-wide" id="go">Войти</button>
</div>
<script>
const err = document.getElementById('err');
async function login(){
  err.hidden = true;
  const r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username: document.getElementById('u').value.trim(), password: document.getElementById('p').value})});
  const d = await r.json();
  if(!r.ok){ err.textContent = d.error || 'Ошибка входа'; err.hidden = false; return; }
  location.href = '/app';
}
document.getElementById('go').onclick = login;
document.getElementById('p').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
document.getElementById('u').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
